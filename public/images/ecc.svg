<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 控制柜主体 -->
  <rect x="30" y="40" width="140" height="120" fill="#1a365d" rx="5" stroke="#2c5282" stroke-width="2"/>
  
  <!-- 控制面板 -->
  <rect x="40" y="50" width="120" height="100" fill="#2c5282" rx="3"/>
  
  <!-- 显示屏 -->
  <rect x="50" y="60" width="100" height="50" fill="#0a1929" rx="2"/>
  <rect x="55" y="65" width="90" height="40" fill="#1e3a5f" rx="1"/>
  
  <!-- 指示灯 -->
  <circle cx="70" cy="120" r="4" fill="#27ae60"/>
  <circle cx="90" cy="120" r="4" fill="#f39c12"/>
  <circle cx="110" cy="120" r="4" fill="#e74c3c"/>
  <circle cx="130" cy="120" r="4" fill="#3498db"/>
  
  <!-- 按钮 -->
  <rect x="60" y="135" width="20" height="10" fill="#34495e" rx="2"/>
  <rect x="90" y="135" width="20" height="10" fill="#34495e" rx="2"/>
  <rect x="120" y="135" width="20" height="10" fill="#34495e" rx="2"/>
  
  <!-- 连接端口 -->
  <rect x="35" y="70" width="8" height="15" fill="#34495e" rx="1"/>
  <rect x="35" y="90" width="8" height="15" fill="#34495e" rx="1"/>
  <rect x="35" y="110" width="8" height="15" fill="#34495e" rx="1"/>
  
  <rect x="157" y="70" width="8" height="15" fill="#34495e" rx="1"/>
  <rect x="157" y="90" width="8" height="15" fill="#34495e" rx="1"/>
  <rect x="157" y="110" width="8" height="15" fill="#34495e" rx="1"/>
  
  <!-- 标签 -->
  <text x="100" y="180" font-family="Arial" font-size="14" font-weight="bold" fill="#1a365d" text-anchor="middle">ECC</text>
</svg>
