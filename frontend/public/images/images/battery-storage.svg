<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 电池主体 -->
  <rect x="60" y="40" width="80" height="120" fill="#3498db" rx="5" stroke="#2980b9" stroke-width="2"/>
  
  <!-- 电池内部结构 -->
  <rect x="70" y="50" width="60" height="100" fill="#5dade2" rx="3"/>
  
  <!-- 电池单元分隔线 -->
  <line x1="100" y1="50" x2="100" y2="150" stroke="#2980b9" stroke-width="1"/>
  <line x1="70" y1="80" x2="130" y2="80" stroke="#2980b9" stroke-width="1"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="#2980b9" stroke-width="1"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="#2980b9" stroke-width="1"/>
  
  <!-- 电池正极 -->
  <rect x="85" y="20" width="30" height="25" fill="#2980b9" rx="2"/>
  <line x1="100" y1="20" x2="100" y2="40" stroke="#2980b9" stroke-width="2"/>
  
  <!-- 电池负极 -->
  <rect x="85" y="160" width="30" height="25" fill="#2980b9" rx="2"/>
  <line x1="100" y1="160" x2="100" y2="140" stroke="#2980b9" stroke-width="2"/>
  
  <!-- 连接端子 -->
  <circle cx="100" cy="15" r="3" fill="#1f618d"/>
  <circle cx="100" cy="185" r="3" fill="#1f618d"/>
</svg>
