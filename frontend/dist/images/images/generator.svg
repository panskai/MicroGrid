<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 发电机主体 -->
  <rect x="30" y="60" width="140" height="80" fill="#e74c3c" rx="5" stroke="#c0392b" stroke-width="2"/>
  
  <!-- 发电机顶部 -->
  <rect x="40" y="50" width="120" height="20" fill="#c0392b" rx="3"/>
  
  <!-- 散热格栅 -->
  <line x1="50" y1="70" x2="50" y2="130" stroke="#c0392b" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="130" stroke="#c0392b" stroke-width="2"/>
  <line x1="90" y1="70" x2="90" y2="130" stroke="#c0392b" stroke-width="2"/>
  <line x1="110" y1="70" x2="110" y2="130" stroke="#c0392b" stroke-width="2"/>
  <line x1="130" y1="70" x2="130" y2="130" stroke="#c0392b" stroke-width="2"/>
  <line x1="150" y1="70" x2="150" y2="130" stroke="#c0392b" stroke-width="2"/>
  
  <!-- 控制面板 -->
  <rect x="60" y="80" width="80" height="50" fill="#2c3e50" rx="2"/>
  <circle cx="80" cy="105" r="5" fill="#27ae60"/>
  <circle cx="100" cy="105" r="5" fill="#f39c12"/>
  <circle cx="120" cy="105" r="5" fill="#e74c3c"/>
  
  <!-- 排气管 -->
  <rect x="160" y="80" width="20" height="30" fill="#34495e" rx="2"/>
  <ellipse cx="170" cy="80" rx="10" ry="5" fill="#2c3e50"/>
  
  <!-- 底座 -->
  <rect x="20" y="140" width="160" height="15" fill="#7f8c8d" rx="3"/>
  
  <!-- 连接线 -->
  <line x1="100" y1="140" x2="100" y2="160" stroke="#34495e" stroke-width="2"/>
  <circle cx="100" cy="160" r="5" fill="#34495e"/>
</svg>
