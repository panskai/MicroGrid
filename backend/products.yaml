      price_usd_per_wp:   0.36          # 含到港运输（$/Wp）
      efficiency_pct:     22.8          # 组件效率（%）
      length_mm:          2384
      width_mm:           1134
      temp_coeff_pct_per_c: -0.29       # N型温度系数更低
      description: >
        N型 TOPCon 超高效组件，双面发电，适合安装面积受限场景。
        32块/套折叠支架 → 22.72 kW/套。

    "655W":
      display_name:       "655Wp High-Eff. Mono-Si PERC"
      watts:              655           # 额定功率（Wp）
      price_usd_per_wp:   0.32          # 含到港运输（$/Wp）
      efficiency_pct:     21.3          # 组件效率（%）
      length_mm:          2384
      width_mm:           1096
      temp_coeff_pct_per_c: -0.34       # 功率温度系数（%/°C）
      description: >
        单晶硅 PERC 高效组件，适合北美离网系统主力配置。
        32块/套折叠支架 → 20.96 kW/套。

    "600W":
      display_name:       "600Wp Mono-Si Standard"
      watts:              600
      price_usd_per_wp:   0.30
      efficiency_pct:     20.5
      length_mm:          2278
      width_mm:           1134
      temp_coeff_pct_per_c: -0.34
      description: >
        单晶硅标准型，性价比优选。
        32块/套折叠支架 → 19.20 kW/套。

    "550W":
      display_name:       "550Wp Mono-Si"
      watts:              550
      price_usd_per_wp:   0.29
      efficiency_pct:     20.0
      length_mm:          2187
      width_mm:           1102
      temp_coeff_pct_per_c: -0.35
      description: >
        32块/套折叠支架 → 17.60 kW/套。


# ────────────────────────────────────────────────────────────
# 2. 折叠支架规格库
#    panels_per_set : 每套支架安装的组件数
#    area_m2        : 展开占地面积（m²）
# ────────────────────────────────────────────────────────────
bracket_systems:
