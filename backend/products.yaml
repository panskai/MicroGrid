# ────────────────────────────────────────────────────────────
# 3. 储能系统（电池包）
#    price_usd      : 含 BMS 的单包出厂价
# ────────────────────────────────────────────────────────────
battery_packs:
  default_model: "LFP-16kWh"
  price_usd_per_kwh_fallback: 300.0   # 找不到具体型号时按此单价估算
  models:
    "LFP-16kWh":
      display_name:   "LFP 16kWh Battery Pack (Standard)"
      capacity_kwh:   16
      price_usd:      3100             # 单包价格（$193.75/kWh）；Excel案例：16包×$3,100=$49,600 ✓
      voltage_v:      51.2
      cycle_life:     6000
      depth_of_discharge_pct: 90
      description: >
        标准型单体柜式储能模块，含 BMS。
        参考配比（Excel案例）：4套折叠支架（~84kW PV）× 3h × 1天 ÷ 16kWh = 16包（256kWh）→ 5年回本 ✓
        估算公式：ceil(PV容量kW × 3 × storageDays ÷ 16)包。

    "LFP-10kWh":
      display_name:   "LFP 10kWh Battery Pack"
      capacity_kwh:   10
      price_usd:      2500             # 单包价格（$250/kWh）
      voltage_v:      51.2
      cycle_life:     4000
      depth_of_discharge_pct: 90

    "LFP-25kWh":
