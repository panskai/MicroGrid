      price_usd:      7250             # 单包价格（$290/kWh）
      voltage_v:      51.2
      cycle_life:     6000
      depth_of_discharge_pct: 90

    "LFP-20kWh":
      display_name:   "LFP 20kWh Battery Pack"
      capacity_kwh:   20
      price_usd:      6000
      voltage_v:      51.2
      cycle_life:     4000
      depth_of_discharge_pct: 90

    "LFP-30kWh":
      display_name:   "LFP 30kWh Battery Pack (Industrial)"
      capacity_kwh:   30
      price_usd:      8400             # 单包价格（$280/kWh）
      voltage_v:      51.2
      cycle_life:     6000
      depth_of_discharge_pct: 90

    "LFP-5kWh":
      display_name:   "LFP 5kWh Battery Pack (Compact)"
      capacity_kwh:   5
      price_usd:      1600
