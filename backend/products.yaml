# ────────────────────────────────────────────────────────────
# 7. 附属成本
#
# 说明：部分成本随支架套数线性增长，部分为固定成本。
# 以 40kW 参考案例（4 套折叠支架 + 16 包 16kWh 电池 = 256kWh）标定：
#
#   国际运输 = 3000 + 4×1950  = $10,800  ✓
#   安装调试 = 1000 + 4×1000  =  $5,000  ✓
#   附件材料 = 8500 + 4×5000  = $28,500  ✓
#   其他初始 = $4,200（固定）  =  $4,200  ✓
#   电池托盘 = 16包 × $250    =  $4,000  ✓
#
# 储能配比规则（与 Excel 案例对齐）：
#   基准公式：ceil(PV容量kW × 3h × storageDays ÷ 16kWh/包)
#     4套655W(83.84kW) × 3h × 1天 = 251kWh → 16包×16kWh（$49,600）✓
#     4套655W(83.84kW) × 3h × 2天 = 503kWh → 32包×16kWh
#     2套655W(41.92kW) × 3h × 1天 = 126kWh →  8包×16kWh
#
# 对于 2 套支架系统：
#   国际运输 = 3000 + 2×1950  =  $6,900（-36%）
#   安装调试 = 1000 + 2×1000  =  $3,000（-40%）
#   附件材料 = 8500 + 2×5000  = $18,500（-35%）
# ────────────────────────────────────────────────────────────
accessories:

  # ── 国际运输（固定 + 按支架套数缩放）──────────────────────
  intl_transport:
    base_usd:             3000.0   # 固定：海运基础费/清关/控制器国内零件
    per_bracket_set_usd:  1950.0   # 变动：每套支架+组件海运增量

  # ── 安装调试费（固定 + 按支架套数缩放）────────────────────
  installation:
    base_usd:             1000.0   # 固定：出差/动员/施工准备
    per_bracket_set_usd:  1000.0   # 变动：每套支架安装人工

  # ── 附件材料（固定 + 按支架套数缩放）──────────────────────
  accessory_materials:
    base_usd:             8500.0   # 固定：主配电箱/交流出线/接地材料
    per_bracket_set_usd:  5000.0   # 变动：每套直流线缆/MC4连接器/辅材

  # ── 其他初始成本（基本固定）────────────────────────────────
  other_initial_usd:      4200.0   # 文档/许可证/首年耗材等（固定）

  # ── 电池托盘（按电池包数量缩放）────────────────────────────
  battery_pallet:
    per_pack_usd:          250.0   # 每包电池托盘费（16包×$250=$4,000 ✓）
    reference_pack_kwh:     10.0   # 参考单包容量（kWh），用于 kWh 换算


# ────────────────────────────────────────────────────────────
# 8. 定价策略
# ────────────────────────────────────────────────────────────
pricing:
  profit_margin:      0.20          # 含税利润率（20%）
  pass_through_items:               # 不计利润的直通成本项
    - diesel_generator_cost
    - installation_cost
