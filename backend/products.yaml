      panels_per_set:  48
      area_m2:         390
      description:     "大型折叠支架，适合大型商业/工业离网项目。"

    "compact_24":
      display_name:    "Compact Folding Bracket (24 panels)"
      panels_per_set:  24
      area_m2:         200
