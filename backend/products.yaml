# ────────────────────────────────────────────────────────────
# 4. 储能逆变器规格
#    voltage_levels : 适配的系统电压等级列表
# ────────────────────────────────────────────────────────────
inverters:
  # packs_per_inverter : 每台逆变器管理的电池包数
  # 标定依据（40kW参考案例）：16包 ÷ 6 = 3台，3×$7,500 = $22,500
  # 储能总成本 = 逆变器 $22,500 + 电池包 $49,600 + 托盘 $4,000 = $76,100 ✓
  models:
    "INV-5000W-240V":
      display_name:      "5kW Bidirectional Inverter (120V/240V Split-phase)"
      power_kw:          5.0
      price_usd:         7500
      voltage_levels:    ["120V/240V"]
      packs_per_inverter: 6       # 16包 ÷ 6 = ceil→3台 ✓（参考案例）
      description:       "适用于北美住宅分裂相系统。"

    "INV-7500W-208V":
      display_name:      "7.5kW Three-phase Inverter (120V/208V)"
      power_kw:          7.5
      price_usd:         7500
      voltage_levels:    ["120V/208V"]
      packs_per_inverter: 6
      description:       "适用于北美三相 Y 接商业系统。"

    "INV-15000W-480V":
      display_name:      "15kW Industrial Three-phase Inverter (277V/480V)"
      power_kw:          15.0
      price_usd:         15000
      voltage_levels:    ["277V/480V"]
      packs_per_inverter: 8       # 工业系统每台可管理更多包
      description:       "适用于北美工业三相系统。"

  # 电压等级 → 默认逆变器型号的快速映射
  voltage_default_map:
    "120V/240V": "INV-5000W-240V"
    "120V/208V": "INV-7500W-208V"
    "277V/480V": "INV-15000W-480V"


