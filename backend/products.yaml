# ============================================================
# products.yaml  —  微电网产品规格配置文件
# ============================================================
# 修改此文件即可更新所有模块的产品参数，无需改动任何 Python 代码。
#
# 字段说明：
#   default_model  : 未指定型号时的默认选项
#   models         : 各型号详细参数
#
# 价格单位全部为 USD（美元）
# ============================================================


# ────────────────────────────────────────────────────────────
# 1. 光伏组件型号库
#    price_usd_per_wp : 出厂含运价（$/Wp），由此派生 $/kW 价格
# ────────────────────────────────────────────────────────────
pv_panels:
